name: build-desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create v0.1.0 --repo "$GITHUB_REPOSITORY" \
                 --title "Friend Desktop 0.1.0" \
                 --notes "Friend on your computer - a native window over friend.ecodia.au. Windows and Linux builds are unsigned (SmartScreen 'More info -> Run anyway' on Windows). The Mac build ships separately, Apple-notarized."

  build:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            plat: win
          - os: ubuntu-latest
            plat: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install
      - name: Build ${{ matrix.plat }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --${{ matrix.plat }} --publish never
      - name: List dist
        shell: bash
        run: ls -la dist
      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s nullglob
          for f in dist/*.exe dist/*.AppImage; do
            echo "uploading $f"
            gh release upload v0.1.0 "$f" --repo "$GITHUB_REPOSITORY" --clobber
          done
